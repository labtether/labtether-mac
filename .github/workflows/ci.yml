name: CI
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check out bundled agent core
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: labtether/labtether-agent
          ref: main
          path: agent-core
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: agent-core/go.mod
      - name: Build Swift host
        run: swift build
      - name: Run Swift tests
        run: swift test
      - name: Build and validate application bundle
        env:
          LABTETHER_AGENT_REPO: ${{ github.workspace }}/agent-core
          LABTETHER_AGENT_VERSION: ci-${{ github.sha }}
        run: ./scripts/build-app.sh --configuration release
