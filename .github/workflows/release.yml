name: Release Source Verification

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  verify-source:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Check out matching bundled agent core
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: labtether/labtether-agent
          ref: ${{ github.ref_name }}
          path: agent-core
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: agent-core/go.mod
          cache: false

      - name: Verify matching immutable source tags
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "$(git rev-parse HEAD)" = \
            "$(git rev-list -n 1 "refs/tags/${GITHUB_REF_NAME}")"
          test "$(git -C agent-core rev-parse HEAD)" = \
            "$(git -C agent-core rev-list -n 1 "refs/tags/${GITHUB_REF_NAME}")"

      - name: Enforce release isolation policy
        run: ./scripts/test-release-policy.sh

      - name: Run Swift tests
        run: |
          mkdir -p "${RUNNER_TEMP}/swift-tests"
          swift test --scratch-path "${RUNNER_TEMP}/swift-tests"

      - name: Run bundled agent gates
        working-directory: agent-core
        run: |
          go test ./...
          go test -race ./...
          go vet ./...

      - name: Build and validate unsigned universal source artifact
        env:
          LABTETHER_AGENT_REPO: ${{ github.workspace }}/agent-core
          LABTETHER_AGENT_VERSION: ${{ github.ref_name }}
          LABTETHER_APP_VERSION: ${{ github.ref_name }}
          LABTETHER_APP_BUILD_NUMBER: ${{ github.run_number }}
          LABTETHER_SWIFT_SCRATCH_PATH: ${{ runner.temp }}/swift-release
        run: |
          mkdir -p "${LABTETHER_SWIFT_SCRATCH_PATH}" "${RUNNER_TEMP}/source-verification"
          LABTETHER_APP_VERSION="${LABTETHER_APP_VERSION#v}" \
            ./scripts/build-app.sh \
              --configuration release \
              --universal \
              --output-dir "${RUNNER_TEMP}/source-verification" \
              --no-sign

      - name: Confirm source checkouts stayed clean
        run: |
          test "$(git status --porcelain=v1 --untracked-files=all)" = "?? agent-core/"
          test -z "$(git -C agent-core status --porcelain=v1 --untracked-files=all)"
