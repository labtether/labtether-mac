name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build universal release binary
        run: swift build -c release --arch arm64 --arch x86_64

      - name: Resolve version from tag
        id: meta
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      # --- Code signing & notarization (requires Apple Developer ID) ---
      # Uncomment when APPLE_CERTIFICATE_P12, APPLE_CERTIFICATE_PASSWORD,
      # APPLE_ID, APPLE_TEAM_ID, and APPLE_APP_PASSWORD secrets are configured.
      #
      # - name: Import code signing certificate
      #   env:
      #     CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
      #     CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      #   run: |
      #     echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
      #     security create-keychain -p "" build.keychain
      #     security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
      #     security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
      #     security default-keychain -s build.keychain
      #
      # - name: Sign binary
      #   run: |
      #     codesign --force --options runtime --sign "Developer ID Application: YOUR_TEAM_NAME" \
      #       --timestamp "LabTether Agent.app"
      #
      # - name: Notarize
      #   env:
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #     APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      #   run: |
      #     ditto -c -k "LabTether Agent.app" "LabTether Agent.zip"
      #     xcrun notarytool submit "LabTether Agent.zip" \
      #       --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" \
      #       --password "$APPLE_APP_PASSWORD" --wait
      #     xcrun stapler staple "LabTether Agent.app"

      - name: Package universal binary
        run: |
          set -euo pipefail
          BUILD_DIR=".build/apple/Products/Release"
          STAGE_DIR="${RUNNER_TEMP}/release-stage"
          mkdir -p "${STAGE_DIR}"

          cp "${BUILD_DIR}/LabTetherAgent" "${STAGE_DIR}/labtether-agent-macos"
          chmod +x "${STAGE_DIR}/labtether-agent-macos"

          cd "${STAGE_DIR}"
          tar czf "labtether-agent-macos-universal.tar.gz" "labtether-agent-macos"
          shasum -a 256 "labtether-agent-macos-universal.tar.gz" > "labtether-agent-macos-universal.tar.gz.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "LabTether Mac Agent ${{ steps.meta.outputs.version }}"
          files: |
            ${{ runner.temp }}/release-stage/labtether-agent-macos-universal.tar.gz
            ${{ runner.temp }}/release-stage/labtether-agent-macos-universal.tar.gz.sha256
